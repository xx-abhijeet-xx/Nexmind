<svg width="200" height="220" viewBox="0 0 86 98" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="di1" x1="0" y1="0" x2="86" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#991b1b"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="di2" x1="20" y1="0" x2="66" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="diris" cx="43" cy="62" r="19" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ef4444"/>
      <stop offset="45%"  stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#0d0000"/>
    </radialGradient>
  </defs>

  <!-- left horn -->
  <path d="M28 36 C22 28 18 18 22 8 C26 4 30 6 30 14" fill="none" stroke="url(#di2)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- right horn -->
  <path d="M58 36 C64 28 68 18 64 8 C60 4 56 6 56 14" fill="none" stroke="url(#di2)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- horn tips -->
  <circle cx="22" cy="8"  r="2.5" fill="#fca5a5"/>
  <circle cx="64" cy="8"  r="2.5" fill="#fca5a5"/>

  <!-- eye shape -->
  <path d="M6 54 C6 54 18 30 43 30 C68 30 80 54 80 54 C80 54 68 78 43 78 C18 78 6 54 6 54Z" fill="url(#diris)" stroke="url(#di2)" stroke-width="1"/>
  <!-- iris ring -->
  <circle cx="43" cy="54" r="14" fill="none" stroke="#f87171" stroke-width="0.75" stroke-opacity="0.4"/>
  <!-- pupil -->
  <circle cx="43" cy="54" r="8"  fill="#0a0000"/>
  <!-- vertical slit -->
  <ellipse cx="43" cy="54" rx="3" ry="7" fill="#1c0000"/>
  <!-- slit inner glow -->
  <ellipse cx="43" cy="54" rx="1.2" ry="5.5" fill="#dc2626" fill-opacity="0.15"/>
  <!-- highlight -->
  <circle cx="38" cy="49" r="2.5" fill="white" fill-opacity="0.45"/>
  <circle cx="48" cy="59" r="1"   fill="white" fill-opacity="0.15"/>

  <!-- top lashes -->
  <path d="M14 44 L10 38 M24 38 L22 32 M34 34 L33 28 M43 32 L43 26 M52 34 L53 28 M62 38 L64 32 M72 44 L76 38" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- blood tears -->
  <path d="M20 64 C18 68 18 74 20 78" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M66 64 C68 68 68 74 66 78" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <circle cx="20" cy="79" r="2" fill="#dc2626" fill-opacity="0.7"/>
  <circle cx="66" cy="79" r="2" fill="#dc2626" fill-opacity="0.7"/>
</svg>
